[phases.setup]
nixPkgs = ["python311", "uv"]

[phases.install]
cmds = ["uv sync --frozen"]

[phases.build]
cmds = [
  "uv run python scripts/build_wiki.py || echo 'WARN: wiki build skipped'",
  "uv run python scripts/build_wiki_graph.py || echo 'WARN: graph build skipped'"
]

[start]
cmd = "uv run uvicorn auto_reply.web.app:create_app --factory --host 0.0.0.0 --port $PORT"
